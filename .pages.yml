          - name: result
            label: Resultat
            type: string
          - name: category
            label: Filtre principal
            type: select
            options:
              values:
                - value: seniors
                  label: Seniors
                - value: cadettes
                  label: Cadettes
                - value: u6
                  label: U6
                - value: u8
                  label: U8
                - value: u10
                  label: U10
                - value: u12
                  label: U12
                - value: u14
                  label: U14
                - value: u16
                  label: U16
                - value: u19
                  label: U19
                - value: ecole
                  label: Ecole de rugby
                - value: jeunes
                  label: Pole jeunes
                - value: general
                  label: Tout le club
          - name: notification
            label: Envoyer une notification
            type: boolean
          - name: audience
            label: Public concerne
            type: select
            list: true
            options:
              values:
                - value: general
                  label: Tout le club
                - value: seniors
                  label: Seniors
                - value: cadettes
                  label: Cadettes
                - value: u6
                  label: U6
                - value: u8
                  label: U8
                - value: u10
                  label: U10
                - value: u12
                  label: U12
                - value: u14
                  label: U14
                - value: u16
                  label: U16
                - value: u19
                  label: U19
                - value: ecole
                  label: Ecole de rugby
                - value: jeunes
                  label: Pole jeunes
                - value: benevoles
                  label: Benevoles
                - value: partenaires
                  label: Partenaires
                - value: evenements
                  label: Evenements
                - value: matchs
                  label: Matchs
                - value: tournois
                  label: Tournois
                - value: resultats
                  label: Resultats
