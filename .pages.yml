            type: text
          - name: count
            label: Effectif
            type: string
          - name: training
            label: Entraînement
            type: string
          - name: teamPhoto
            label: Photo effectif
            type: image
          - name: staff
            label: Staff
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{firstName} {lastName}"
            fields:
              - name: firstName
                label: Prénom
                type: string
              - name: lastName
                label: Nom
                type: string
              - name: photo
                label: Photo
                type: image

  - name: youth
