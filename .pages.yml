          - name: firstName
            label: Prenom
            type: string
          - name: lastName
            label: Nom
            type: string
          - name: role
            label: Role
            type: string
          - name: phone
            label: Telephone optionnel
            type: string
          - name: email
            label: Email optionnel
            type: string
          - name: photo
            label: Photo du staff
            type: image
      - name: players
        label: Joueurs
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{group} - {firstName} {lastName}"
