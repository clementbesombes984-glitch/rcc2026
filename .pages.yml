media:
  input: assets/uploads
  output: /assets/uploads
  rename: safe
  categories: [image]

content:
  - name: matches
    label: Calendrier
    type: file
    path: data/matches.json
    format: json
    fields:
      - name: matches
        label: Matchs, tournois et rendez-vous sportifs
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{date} - {type_evenement} - {title}"
        fields:
          - name: title
            label: Titre
            type: string
          - name: type_evenement
            label: Type d evenement
            type: select
            required: true
            options:
              values:
                - value: match
                  label: Match
                - value: tournoi
                  label: Tournoi
          - name: team
            label: Equipe / categorie concernee
            type: select
            options:
              values:
                - Seniors
                - Feminines
                - U6
                - U8
                - U10
                - U12
                - U14
                - U16
                - U19
                - Ecole de rugby
                - Pole jeunes
          - name: teams
            label: Equipes / categories concernees pour un tournoi
            type: select
            list: true
            options:
              values:
                - Seniors
                - Feminines
                - U6
                - U8
                - U10
                - U12
                - U14
                - U16
                - U19
                - Ecole de rugby
                - Pole jeunes
          - name: opponent
            label: Adversaire si match
            type: string
          - name: tournamentName
            label: Nom du tournoi si tournoi
            type: string
          - name: date
            label: Date
            type: date
            required: true
          - name: time
            label: Heure
            type: string
            required: true
          - name: home
            label: Domicile
            type: boolean
          - name: away
            label: Ancien champ adversaire / exterieur
            type: string
          - name: venue
            label: Ancien champ lieu
            type: string
          - name: location
            label: Lieu
            type: string
            required: true
          - name: address
            label: Adresse
            type: string
          - name: competition
            label: Competition
            type: string
          - name: status
            label: Statut
            type: select
            options:
              values:
                - value: upcoming
                  label: A venir
                - value: win
                  label: Victoire
                - value: loss
                  label: Defaite
                - value: muted
                  label: Neutre
          - name: result
            label: Resultat / badge
            type: string
          - name: category
            label: Categorie
            type: select
            options:
              values:
                - seniors
                - feminines
                - u6
                - u8
                - u10
                - u12
                - u14
                - u16
                - u19
                - ecole
                - jeunes
          - name: description
            label: Description
            type: text
          - name: notification
            label: Preparer une notification
            type: boolean
          - name: audience
            label: Public cible
            type: select
            list: true
            options:
              values:
                - general
                - seniors
                - feminines
                - u6
                - u8
                - u10
                - u12
                - u14
                - u16
                - u19
                - ecole
                - jeunes
                - benevoles
                - partenaires
                - evenements
                - matchs
                - tournois
                - resultats
                - entrainements
                - important
  - name: news
    label: Actualités
    type: file
    path: data/news.json
    format: json
    fields:
      - name: news
        label: Actualités
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{category} - {title}"
        fields:
          - name: category
            label: Catégorie
            type: string
            required: true
          - name: title
            label: Titre
            type: string
            required: true
          - name: summary
            label: Résumé
            type: text
          - name: important
            label: Actualité importante
            type: boolean
          - name: notification
            label: Preparer une notification
            type: boolean
          - name: audience
            label: Public cible
            type: select
            list: true
            options:
              values:
                - general
                - seniors
                - feminines
                - u6
                - u8
                - u10
                - u12
                - u14
                - u16
                - u19
                - ecole
                - jeunes
                - benevoles
                - partenaires
                - evenements
                - matchs
                - tournois
                - resultats
                - entrainements
                - important
          - name: image
            label: Image
            type: image

  - name: senior
    label: Joueurs seniors
    type: file
    path: data/senior.json
    format: json
    fields:
      - name: staff
        label: Staff senior
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{firstName} {lastName} - {role}"
        fields:
          - name: firstName
            label: Prenom
            type: string
            required: true
          - name: lastName
            label: Nom
            type: string
            required: true
          - name: role
            label: Role
            type: string
          - name: photo
            label: Photo
            type: image
      - name: players
        label: Joueurs
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{firstName} {lastName} - {position}"
        fields:
          - name: group
            label: Groupe de poste
            type: string
            required: true
          - name: firstName
            label: Prénom
            type: string
            required: true
          - name: lastName
            label: Nom
            type: string
            required: true
          - name: position
            label: Poste
            type: string
          - name: weight
            label: Poids / info
            type: string
          - name: tag
            label: Qualité
            type: string
          - name: photo
            label: Photo
            type: image

