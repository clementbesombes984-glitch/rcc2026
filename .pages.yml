            label: A domicile
            type: boolean
          - name: opponent
            label: Adversaire si match
            type: string
          - name: tournamentName
            label: Nom du tournoi si tournoi
            type: string
          - name: description
            label: Description
            type: text
          - name: status
            label: Statut
            type: select
            options:
              values:
                - value: upcoming
                  label: A venir
                - value: win
                  label: Victoire
                - value: loss
                  label: Defaite
