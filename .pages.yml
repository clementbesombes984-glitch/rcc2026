                summary: "{firstName} {lastName}"
            fields:
              - name: firstName
                label: Prénom
                type: string
              - name: lastName
                label: Nom
                type: string
              - name: photo
                label: Photo
                type: image

  - name: feminines
    label: Féminines
    type: file
    path: data/feminines.json
    format: json
    fields:
      - name: categories
        label: Catégorie cadettes
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{age} - {label}"
        fields:
          - name: age
            label: Catégorie
            type: string
            required: true
          - name: label
            label: Titre
            type: string
          - name: summary
            label: Résumé
            type: text
          - name: count
            label: Effectif
            type: string
          - name: training
            label: Entraînement
            type: string
          - name: teamPhoto
            label: Photo effectif
            type: image
          - name: staff
            label: Staff
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{firstName} {lastName}"
            fields:
              - name: firstName
                label: Prénom
                type: string
              - name: lastName
                label: Nom
                type: string
              - name: photo
                label: Photo
                type: image


  - name: gallery
    label: Galerie photo
    type: file
    path: data/gallery.json
    format: json
    fields:
      - name: albums
        label: Albums
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{category} - {title}"
        fields:
          - name: title
            label: Titre
            type: string
            required: true
          - name: category
            label: Rubrique
            type: select
            options:
              values:
                - Entrainements
                - Matchs
                - Ecole de rugby
                - Benevoles
                - Evenements
          - name: date
            label: Date
            type: date
          - name: description
            label: Description
            type: text
          - name: cover
            label: Image de couverture
            type: image
          - name: photos
            label: Photos
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{alt}"
            fields:
              - name: image
                label: Photo
                type: image
              - name: alt
                label: Texte alternatif
                type: string

  - name: partners
    label: Partenaires
    type: file
    path: data/partners.json
    format: json
    fields:
      - name: intro
        label: Introduction
        type: text
      - name: partners
        label: Liste des partenaires
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{category} - {name}"
        fields:
          - name: category
            label: Catégorie
            type: string
          - name: name
            label: Nom
            type: string
            required: true
          - name: description
            label: Description
            type: text
          - name: logo
            label: Logo
            type: image
          - name: url
            label: Site internet
            type: string

  - name: project
    label: Votre RCC demain
    type: file
    path: data/project.json
    format: json
    fields:
      - name: title
        label: Titre
        type: string
      - name: intro
        label: Introduction
        type: text
      - name: contactEmail
        label: Email de contact
        type: string
      - name: callout
        label: Phrase d'appel
        type: text
      - name: sections
        label: Sections du projet
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: title
            label: Titre
            type: string
          - name: icon
            label: Icône courte
            type: string
          - name: text
            label: Texte
            type: text

  - name: shop
    label: Boutique
    type: file
    path: data/shop.json
    format: json
    fields:
      - name: products
        label: Produits
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{category} - {name}"
        fields:
          - name: name
            label: Nom produit
            type: string
            required: true
          - name: category
            label: Categorie
            type: select
            required: true
            options:
              values:
                - Maillots
                - Sweats
                - Polos
                - Shorts
                - Accessoires
          - name: image
            label: Image
            type: image
          - name: price
            label: Prix
            type: string
          - name: description
            label: Description courte
            type: text
          - name: url
            label: Lien achat Sponsport
            type: string
          - name: badge
            label: Badge optionnel
            type: select
            options:
              values:
                - ""
                - Nouveau
                - Promo
                - Precommande

  - name: settings
    label: Paramètres du club
    type: file
    path: data/settings.json
    format: json
    fields:
      - name: clubName
        label: Nom du club
        type: string
      - name: stadium
        label: Stade
        type: string
      - name: city
        label: Ville
        type: string
      - name: address
        label: Adresse
        type: string
      - name: phone
        label: Téléphone
        type: string
      - name: email
        label: Email
        type: string
      - name: facebook
        label: Facebook
        type: string
      - name: instagram
        label: Instagram
        type: string
      - name: mapsUrl
        label: Google Maps embed URL
        type: string
      - name: ffrUrl
        label: Lien FFR / rugby local
        type: string
      - name: joinTitle
        label: Titre Nous rejoindre
        type: string
      - name: joinText
        label: Texte Nous rejoindre
        type: text
      - name: parameters
        label: Blocs infos pratiques
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{title}"
        fields:
          - name: title
            label: Titre
            type: string
          - name: text
            label: Texte
            type: text
          - name: linkLabel
            label: Libellé du lien
            type: string
          - name: linkUrl
            label: URL du lien
            type: string

settings:
  hide: false
