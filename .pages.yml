media:
  input: assets/uploads
  output: /assets/uploads
  rename: safe
  categories: [image]

content:
  - name: news
    label: Actualites
    type: file
    path: data/news.json
    format: json
    fields:
      - name: news
        label: Articles du club
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{date} - {category} - {title}"
        fields:
          - name: title
            label: Titre
            type: string
            required: true
          - name: summary
            label: Resume
            type: text
          - name: body
            label: Contenu complet
            type: text
          - name: image
            label: Image
            type: image
          - name: category
            label: Categorie
            type: select
            required: true
            options:
              values:
                - Club
                - Seniors
                - Ecole de rugby
                - Pole jeunes
                - Cadettes
                - Benevoles
                - Partenaires
                - Tournois
                - Evenements
          - name: audience
            label: Public concerne
            type: select
            list: true
            options:
              values:
                - value: general
                  label: Tout le club
                - value: seniors
                  label: Seniors
                - value: cadettes
                  label: Cadettes
                - value: u6
                  label: U6
                - value: u8
                  label: U8
                - value: u10
                  label: U10
                - value: u12
                  label: U12
                - value: u14
                  label: U14
                - value: u16
                  label: U16
                - value: u19
                  label: U19
                - value: ecole
                  label: Ecole de rugby
                - value: jeunes
                  label: Pole jeunes
                - value: benevoles
                  label: Benevoles
                - value: partenaires
                  label: Partenaires
                - value: evenements
                  label: Evenements
                - value: matchs
                  label: Matchs
                - value: tournois
                  label: Tournois
                - value: resultats
                  label: Resultats
                - value: entrainements
                  label: Entrainements
                - value: important
                  label: Urgent / important
          - name: important
            label: Mettre en info importante
            type: boolean
          - name: notification
            label: Envoyer une notification
            type: boolean
          - name: featured
            label: Mettre a la une
            type: boolean
          - name: date
            label: Date de publication
            type: date

  - name: matches
    label: Calendrier
    type: file
    path: data/matches.json
    format: json
    fields:
      - name: matches
        label: Evenements du calendrier
        type: object
        list:
          collapsible:
