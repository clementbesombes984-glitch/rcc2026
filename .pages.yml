        fields:
          - name: title
            label: Titre
            type: string
            required: true
          - name: type_evenement
            label: Type d'evenement
            type: select
            required: true
            options:
              values:
                - value: match
                  label: Match
                - value: tournoi
                  label: Tournoi
                - value: entrainement
                  label: Entrainement
                - value: reunion
                  label: Reunion
                - value: evenement_club
                  label: Evenement club
          - name: team
            label: Equipe principale
            type: select
            options:
              values:
                - Seniors
                - Cadettes
                - U6
                - U8
                - U10
                - U12
                - U14
                - U16
                - U19
                - Ecole de rugby
                - Pole jeunes
                - Tout le club
          - name: teams
            label: Equipes concernees
            type: select
            list: true
            options:
              values:
                - Seniors
                - Cadettes
                - U6
                - U8
                - U10
                - U12
                - U14
                - U16
                - U19
                - Ecole de rugby
                - Pole jeunes
                - Tout le club
