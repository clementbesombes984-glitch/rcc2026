media:
  input: assets/uploads
  output: /assets/uploads
  rename: safe
  categories: [image]

content:
  - name: news
    label: Actualites
    type: file
    path: data/news.json
    format: json
    fields:
      - name: news
        label: Articles du club
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{date} - {category} - {title}"
        fields:
          - name: title
            label: Titre
            type: string
            required: true
          - name: summary
            label: Resume
            type: text
          - name: body
            label: Contenu complet
            type: text
          - name: image
            label: Image
            type: image
          - name: category
            label: Categorie
            type: select
            required: true
            options:
              values:
                - Club
                - Seniors
                - Ecole de rugby
                - Pole jeunes
                - Cadettes
                - Benevoles
                - Partenaires
                - Tournois
                - Evenements
          - name: audience
            label: Public concerne
            type: select
            list: true
            options:
              values:
                - value: general
                  label: Tout le club
                - value: seniors
                  label: Seniors
                - value: cadettes
                  label: Cadettes
                - value: u6
                  label: U6
                - value: u8
                  label: U8
                - value: u10
                  label: U10
                - value: u12
                  label: U12
                - value: u14
                  label: U14
                - value: u16
                  label: U16
                - value: u18
                  label: U18
                - value: ecole
                  label: Ecole de rugby
                - value: jeunes
                  label: Pole jeunes
                - value: benevoles
                  label: Benevoles
                - value: partenaires
                  label: Partenaires
                - value: evenements
                  label: Evenements
                - value: matchs
                  label: Matchs
                - value: tournois
                  label: Tournois
                - value: resultats
                  label: Resultats
                - value: entrainements
                  label: Entrainements
                - value: important
                  label: Urgent / important
          - name: important
            label: Mettre en info importante
            type: boolean
          - name: notification
            label: Envoyer une notification
            type: boolean
          - name: publishFacebook
            label: Publier sur Facebook
            type: boolean
          - name: publishInstagram
            label: Publier sur Instagram
            type: boolean
          - name: featured
            label: Mettre a la une
            type: boolean
          - name: date
            label: Date de publication
            type: date

  - name: matches
    label: Calendrier
    type: file
    path: data/matches.json
    format: json
    fields:
      - name: matches
        label: Evenements du calendrier
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{date} - {type_evenement} - {title}"
        fields:
          - name: title
            label: Titre
            type: string
            required: true
          - name: type_evenement
            label: Type d'evenement
            type: select
            required: true
            options:
              values:
                - value: match
                  label: Match
                - value: tournoi
                  label: Tournoi
                - value: entrainement
                  label: Entrainement
                - value: reunion
                  label: Reunion
                - value: evenement_club
                  label: Evenement club
          - name: team
            label: Equipe / categorie principale
            type: select
            options:
              values:
                - Seniors
                - Cadettes
                - U6
                - U8
                - U10
                - U12
                - U14
                - U16
                - U18
                - Ecole de rugby
                - Pole jeunes
                - Tout le club
          - name: teams
            label: Equipes / categories concernees
            type: select
            list: true
            options:
              values:
                - Seniors
                - Cadettes
                - U6
                - U8
                - U10
                - U12
                - U14
                - U16
                - U18
                - Ecole de rugby
                - Pole jeunes
                - Tout le club
          - name: date
            label: Date
            type: date
            required: true
          - name: time
            label: Heure
            type: string
            required: true
          - name: location
            label: Lieu
            type: string
            required: true
          - name: address
            label: Adresse
            type: string
          - name: home
            label: A domicile
            type: boolean
          - name: opponent
            label: Adversaire si match
            type: string
          - name: tournamentName
            label: Nom du tournoi si tournoi
            type: string
          - name: description
            label: Description
            type: text
          - name: status
            label: Statut
            type: select
            options:
              values:
                - value: upcoming
                  label: A venir
                - value: win
                  label: Victoire
                - value: loss
                  label: Defaite
                - value: muted
                  label: Information
          - name: result
            label: Resultat
            type: string
          - name: category
            label: Categorie de filtre
            type: select
            options:
              values:
                - value: seniors
                  label: Seniors
                - value: cadettes
                  label: Cadettes
                - value: u6
                  label: U6
                - value: u8
                  label: U8
                - value: u10
                  label: U10
                - value: u12
                  label: U12
                - value: u14
                  label: U14
                - value: u16
                  label: U16
                - value: u18
                  label: U18
                - value: ecole
                  label: Ecole de rugby
                - value: jeunes
                  label: Pole jeunes
                - value: general
                  label: Tout le club
          - name: notification
            label: Envoyer une notification
            type: boolean
          - name: audience
            label: Public concerne
            type: select
            list: true
            options:
              values:
                - value: general
                  label: Tout le club
                - value: seniors
                  label: Seniors
                - value: cadettes
                  label: Cadettes
                - value: u6
                  label: U6
                - value: u8
                  label: U8
                - value: u10
                  label: U10
                - value: u12
                  label: U12
                - value: u14
                  label: U14
                - value: u16
                  label: U16
                - value: u18
                  label: U18
                - value: ecole
                  label: Ecole de rugby
                - value: jeunes
                  label: Pole jeunes
                - value: benevoles
                  label: Benevoles
                - value: partenaires
                  label: Partenaires
                - value: evenements
                  label: Evenements
                - value: matchs
                  label: Matchs
                - value: tournois
                  label: Tournois
                - value: resultats
                  label: Resultats
                - value: entrainements
                  label: Entrainements
                - value: important
                  label: Urgent / important

  - name: gallery
    label: Galerie
    type: file
    path: data/gallery.json
    format: json
    fields:
      - name: albums
        label: Albums photo
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{date} - {category} - {title}"
        fields:
          - name: title
            label: Nom de l'album
            type: string
            required: true
          - name: category
            label: Rubrique
            type: select
            required: true
            options:
              values:
                - Entrainements
                - Matchs
                - Ecole de rugby
                - Benevoles
                - Evenements
                - Partenaires
          - name: date
            label: Date
            type: date
          - name: description
            label: Description
            type: text
          - name: cover
            label: Photo de couverture
            type: image
          - name: photos
            label: Photos
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{alt}"
            fields:
              - name: image
                label: Photo
                type: image
              - name: alt
                label: Description de la photo
                type: string
          - name: featured
            label: Mettre en avant
            type: boolean

  - name: shop
    label: Boutique
    type: file
    path: data/shop.json
    format: json
    fields:
      - name: products
        label: Produits
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{category} - {name}"
        fields:
          - name: name
            label: Nom produit
            type: string
            required: true
          - name: category
            label: Categorie
            type: select
            required: true
            options:
              values:
                - Maillots
                - Sweats
                - Polos
                - Shorts
                - Accessoires
          - name: image
            label: Image
            type: image
          - name: price
            label: Prix
            type: string
          - name: description
            label: Description courte
            type: text
          - name: url
            label: Lien Sponsport
            type: string
          - name: badge
            label: Badge optionnel
            type: select
            options:
              values:
                - ""
                - Nouveau
                - Promo
                - Precommande

  - name: partners
    label: Partenaires
    type: file
    path: data/partners.json
    format: json
    fields:
      - name: intro
        label: Texte d'introduction
        type: text
      - name: partners
        label: Liste des partenaires
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{name}"
        fields:
          - name: name
            label: Nom du partenaire
            type: string
            required: true
          - name: description
            label: Description
            type: text
          - name: logo
            label: Logo
            type: image
          - name: url
            label: Site internet
            type: string
          - name: category
            label: Groupe
            type: string

  - name: senior
    label: Seniors
    type: file
