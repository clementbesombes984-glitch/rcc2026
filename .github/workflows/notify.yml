name: RCC notifications

on:
  push:
    branches:
      - main
    paths:
      - data/news.json
      - data/matches.json

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send RCC notifications
        env:
          BEFORE_REF: ${{ github.event.before }}
          SITE_URL: ${{ secrets.RCC_SITE_URL }}
          PUSH_ADMIN_TOKEN: ${{ secrets.RCC_PUSH_ADMIN_TOKEN }}
        run: node scripts/notify-changes.js
